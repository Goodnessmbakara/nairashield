name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

env:
  WORKER_URL: ${{ vars.WORKER_URL || 'https://retegol-bot.zanbuilds.workers.dev' }}

jobs:
  worker:
    name: Deploy worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Smoke check
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/health.json -w '%{http_code}' "$WORKER_URL/health" || true)
            if [ "$code" = "200" ]; then
              cat /tmp/health.json
              echo
              exit 0
            fi
            echo "health attempt $i → HTTP $code; retrying…"
            sleep 3
          done
          echo "Worker health check failed"
          cat /tmp/health.json 2>/dev/null || true
          exit 1

  # Dashboard hosts on Vercel (https://retegol.vercel.app), NOT Cloudflare Pages.
  # The old job called `wrangler pages deploy --project-name=retegol` and failed with
  # Project not found (8000007) because that CF Pages project was never created.
  pages:
    name: Build & deploy dashboard
    needs: worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build
        working-directory: web
        env:
          # Astro inlines PUBLIC_* at build time; web/.env is gitignored
          PUBLIC_AGENT_URL: ${{ env.WORKER_URL }}
        run: pnpm run build

      - name: Deploy to Vercel (production)
        working-directory: web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          # Dashboard production host is Vercel (retegol.vercel.app), not Cloudflare Pages.
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "Dashboard build OK. Skipping Vercel deploy — VERCEL_TOKEN secret not set."
            echo "Live UI: https://retegol.vercel.app (Vercel Git integration or manual deploy)."
            exit 0
          fi
          # Optional project link via secrets (recommended in CI)
          if [ -n "${VERCEL_ORG_ID:-}" ] && [ -n "${VERCEL_PROJECT_ID:-}" ]; then
            mkdir -p .vercel
            printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json
          fi
          npx vercel@latest deploy dist --prod --token="$VERCEL_TOKEN" --yes
