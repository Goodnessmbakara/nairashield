name = "nairashield-bot"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

# Sessions (Google OAuth)
[[kv_namespaces]]
binding = "SESSIONS"
id = "7b502af8710344cfa1be4edae5360910"
preview_id = "7b502af8710344cfa1be4edae5360910"

# Agent tick history + yield position
[[kv_namespaces]]
binding = "AGENT_STATE"
id = "81aca151cfdb4a149013e3b2131ff4f1"
preview_id = "81aca151cfdb4a149013e3b2131ff4f1"

[triggers]
crons = ["* * * * *"]

[vars]
WORKER_URL = "https://nairashield-bot.zanbuilds.workers.dev"
FRONTEND_URL = "https://nairashield.pages.dev"
# Agent policy (yield, size, margins, horizons) is in src/agent/config.ts

# Secrets (set via `wrangler secret put`):
# ACCOUNT_MASTER_KEY — 32-byte hex, AES-GCM key for custodial deposit keypairs
# ADMIN_EMAILS       — comma-separated admin email addresses
