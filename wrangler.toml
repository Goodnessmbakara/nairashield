name = "nairashield-bot"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

# D1 — primary relational store (users, sessions)
[[d1_databases]]
binding = "DB"
database_name = "nairashield-db"
database_id = "6bec19f8-2988-4855-becb-51d4725674e0"

# Sessions (Google OAuth)
[[kv_namespaces]]
binding = "SESSIONS"
id = "580ac9eb72d64c4e85e4835a2520f006"
preview_id = "580ac9eb72d64c4e85e4835a2520f006"

# Agent tick history + yield position
[[kv_namespaces]]
binding = "AGENT_STATE"
id = "dcb1020ab5f84f8381b7180159ca0fed"
preview_id = "dcb1020ab5f84f8381b7180159ca0fed"

[triggers]
crons = ["* * * * *"]

[vars]
WORKER_URL = "https://nairashield-bot.zanbuilds.workers.dev"
FRONTEND_URL = "https://nairashield.pages.dev"
# Agent policy (yield, size, margins, horizons) is in src/agent/config.ts
