name = "nairashield-bot"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

# Sessions (Google OAuth)
[[kv_namespaces]]
binding = "SESSIONS"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

# Agent tick history + yield position
[[kv_namespaces]]
binding = "AGENT_STATE"
id = "00000000000000000000000000000001"
preview_id = "00000000000000000000000000000001"

[triggers]
crons = ["* * * * *"]

[vars]
WORKER_URL = "http://127.0.0.1:8787"
FRONTEND_URL = "http://127.0.0.1:4321"
RPC_URL = "https://api.devnet.solana.com"
# Agent policy defaults (override via .dev.vars)
# Y_net = C*m - C*r*T  (market-make) — TRADE only if Y_net/C >= MIN_EDGE
YIELD_APY = "0.08"
TRADE_SIZE_USDC = "10"
MIN_EDGE = "0.01"
MAKER_MARGIN = "0.02"
EVENT_HORIZON_HOURS = "2"
MAX_OPEN_POSITIONS = "3"
